version: "3.9"

services:
  streamlit:
    build: .
    container_name: vbcua-streamlit
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./reports:/app/reports
    restart: unless-stopped

  api:
    build: .
    container_name: vbcua-api
    command:
      ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./reports:/app/reports
    restart: unless-stopped
